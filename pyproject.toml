[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name ="test_project"
version = "0.1.0"
dependencies = [
    "httpx",
    "gidgethub[httpx]>4.0.0",
    "django>2.1; os_name != 'nt'",
    "fastapi"
]
author = [
    {name = "Rosculet Cosmin", email ="rosculet.cosmin@yahoo.com"}
]
description = "Lovely Spam! Wonderful Spam!"
readme = "README.md"
requires-python = ">=3.12"
keywords = ["egg", "bacon", "FC26"]
clasifiers = [
    "dEVELOPMENT sTAUTS : -aLPHA",
    "programming language :: Python",
]

# [project.optional]
